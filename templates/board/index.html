<!-- templates/board/index.html -->

{% extends 'base.html' %}

{% block content %}
<h1>게시판</h1>

{% if posts %}
  <table class="table table-hover">
    <thead>
      <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성일</th>
        <th>작성자</th>
      </tr>
    </thead>
    <tbody>
      {% for post in posts %}
      <tr>
        <td>{{ post.id }}</td>
        <td>{{ post.title }}</td>
        <td>{{ post.created_at|date:"Y-m-d H:i" }}</td>
        <td>{{ post.author }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% else %}
  <p>아직 작성된 게시글이 없습니다.</p>
{% endif %}
{% endblock %}
